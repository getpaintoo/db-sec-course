# Лабораторный pg_hba.conf для практики 3.
# Порядок правил важен: сверху размещены специальные правила для отдельных методов.

# Системный пользователь postgres внутри контейнера подключается по peer.
local   all             postgres                                peer

# Остальные локальные подключения внутри контейнера требуют SCRAM.
local   all             all                                     scram-sha-256

# Лабораторные правила для демонстрации методов аутентификации.
host    all             user_scram      127.0.0.1/32            trust
host    all             user_scram      ::1/128                 trust

host    all             user_md5        127.0.0.1/32            md5
host    all             user_md5        ::1/128                 md5

host    all             user_alice      127.0.0.1/32            scram-sha-256
host    all             user_alice      ::1/128                 scram-sha-256

# Значение по умолчанию для остальных локальных TCP-подключений.
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256

# Внешние подключения в учебной конфигурации запрещены.
host    all             all             0.0.0.0/0               reject
host    all             all             ::/0                    reject
