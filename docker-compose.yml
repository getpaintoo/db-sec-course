services:
  db:
    image: postgres:16
    container_name: db-sec-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "127.0.0.1:5432:5432"
    command:
      - postgres
      - -c
      - hba_file=/workspace/docker/postgresql/pg_hba.conf
      - -c
      - password_encryption=scram-sha-256
    volumes:
      - ./:/workspace
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
